image: debian/bookworm
packages:
  - build-essential
  - fonts-dejavu
  - libcairo2-dev
  - libffi-dev
  - libgdk-pixbuf2.0-dev
  - libjpeg-dev
  - libpango1.0-dev
  - python3-dev
  - tox
  - zlib1g-dev
sources:
  - https://github.com/whyNotHugo/django-renderpdf
environment:
  FORCE_COLOR: yes
  CI: true
tasks:
  - check-python:
      python3 --version | grep 'Python 3.11'
  - tests: |
      cd django-renderpdf
      tox -e py311
  - lint: |
      cd django-renderpdf
      tox -e lint
